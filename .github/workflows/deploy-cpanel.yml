# Deploy portal, API, and marketing site to cPanel (manual trigger).
#
# Required GitHub secrets:
#   CPANEL_SSH_HOST, CPANEL_SSH_USER, CPANEL_SSH_PORT, CPANEL_SSH_PRIVATE_KEY
#   CPANEL_REMOTE_ROOT  → portal docroot, e.g. /home/USER/public_html/app
#   CPANEL_SITE_ROOT    → site root (parent of app/ and api/), e.g. /home/USER/public_html
#   VITE_* for web build (see "Create web .env" below)
#   VITE_PORTAL_URL     → marketing build only, e.g. https://app.carahulgupta.in
#
# Deploy order: portal → app/, API → api/, marketing → site root (rsync excludes app/ + api/).

name: Deploy to cPanel via SSH (manual)

on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            web-public/package-lock.json

      # ── Portal (web) ──────────────────────────────────────────────────────
      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Create web .env from secrets
        working-directory: web
        run: |
          printf 'VITE_API_BASE_URL=%s\nVITE_GOOGLE_CLIENT_ID=%s\nVITE_MSAL_CLIENT_ID=%s\nVITE_MSAL_TENANT_ID=%s\nVITE_MARKETING_URL=%s\n' \
            "${{ secrets.VITE_API_BASE_URL }}" \
            "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            "${{ secrets.VITE_MSAL_CLIENT_ID }}" \
            "${{ secrets.VITE_MSAL_TENANT_ID }}" \
            "${{ secrets.VITE_MARKETING_URL }}" \
            > .env

      - name: Build web (portal)
        working-directory: web
        run: npm run build

      # ── Marketing (web-public) ─────────────────────────────────────────────
      - name: Install web-public dependencies
        working-directory: web-public
        run: npm ci

      - name: Create web-public .env for production build
        working-directory: web-public
        run: |
          printf 'VITE_PORTAL_URL=%s\n' "${{ secrets.VITE_PORTAL_URL }}" > .env

      - name: Build web-public (marketing)
        working-directory: web-public
        run: npm run build

      # ── SSH ─────────────────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.CPANEL_SSH_PORT }} ${{ secrets.CPANEL_SSH_HOST }} >> ~/.ssh/known_hosts

      # Portal only under CPANEL_REMOTE_ROOT (e.g. …/public_html/app/)
      - name: Deploy portal (web/dist) to app subdomain docroot
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.CPANEL_SSH_PORT }}" \
            web/dist/ \
            ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_REMOTE_ROOT }}/

      # API stays under site root …/public_html/api/ (not under app/)
      - name: Deploy server-php to site root api/
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.CPANEL_SSH_PORT }}" \
            server-php/ \
            ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_SITE_ROOT }}/api/

      # Marketing at site root; never delete sibling app/ or api/ trees
      - name: Deploy marketing (web-public/dist) to site root
        run: |
          rsync -avz --delete \
            --exclude='app/' \
            --exclude='api/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.CPANEL_SSH_PORT }}" \
            web-public/dist/ \
            ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_SITE_ROOT }}/

      - name: Fix file permissions and run DB migrations via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          # MIGRATION_DB_USER / MIGRATION_DB_PASS must be the table-owner role
          # (carahulgupta on cPanel). They are injected here so migrate.php
          # uses the owner for DDL while the app still uses DB_USER at runtime.
          envs: MIGRATION_DB_USER,MIGRATION_DB_PASS
          script: |
            find ${{ secrets.CPANEL_SITE_ROOT }}/api -type d -exec chmod 755 {} \;
            find ${{ secrets.CPANEL_SITE_ROOT }}/api -type f -exec chmod 644 {} \;
            echo "✅ Permissions fixed"
            echo "▶  Running database migrations…"
            MIGRATION_DB_USER="${{ secrets.MIGRATION_DB_USER }}" \
            MIGRATION_DB_PASS="${{ secrets.MIGRATION_DB_PASS }}" \
            php ${{ secrets.CPANEL_SITE_ROOT }}/api/database/migrate.php
            echo "✅ Deploy complete"

      # ── Superadmin daily digest — cron reminder ─────────────────────────────
      # The digest CLI script is deployed at:
      #   {CPANEL_SITE_ROOT}/api/cli/send-digest.php
      #
      # A cPanel cron job must be configured MANUALLY (once) in the
      # cPanel → Cron Jobs UI. Suggested schedule: daily at 11:00 PM IST
      # which is 17:30 UTC:
      #
      #   30 17 * * *  php /home/<cpanel_user>/<CPANEL_SITE_ROOT>/api/cli/send-digest.php \
      #                    >> /home/<cpanel_user>/logs/digest.log 2>&1
      #
      # Replace <cpanel_user> and <CPANEL_SITE_ROOT> with real values.
      # You can test it any time by running the command manually via SSH:
      #   php /home/<cpanel_user>/<CPANEL_SITE_ROOT>/api/cli/send-digest.php --dry-run
      # ────────────────────────────────────────────────────────────────────────
