# Demo deploy of the *portal* (web/) only, with base path /cagupta/ for GitHub Pages.
# Production uses deploy-cpanel.yml (portal + marketing + API). No change needed here
# for VITE_MARKETING_URL / CPANEL_SITE_ROOT — those secrets are cPanel-only.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web for GitHub Pages
        working-directory: web
        run: npm run build:github

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
