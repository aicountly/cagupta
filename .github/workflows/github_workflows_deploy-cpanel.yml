name: Deploy to cPanel via SSH (manual)

on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Create web .env from secrets
        working-directory: web
        run: |
          printf 'VITE_API_BASE_URL=%s\nVITE_GOOGLE_CLIENT_ID=%s\nVITE_MSAL_CLIENT_ID=%s\nVITE_MSAL_TENANT_ID=%s\n' \
            "${{ secrets.VITE_API_BASE_URL }}" \
            "${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            "${{ secrets.VITE_MSAL_CLIENT_ID }}" \
            "${{ secrets.VITE_MSAL_TENANT_ID }}" \
            > .env

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.CPANEL_SSH_PORT }} ${{ secrets.CPANEL_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy web/dist to public_html via rsync
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.CPANEL_SSH_PORT }}" \
            web/dist/ \
            ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_REMOTE_ROOT }}/

      - name: Deploy server-php to public_html/api via rsync
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.env' \
            --include='.env.example' \
            --exclude='.env.*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.CPANEL_SSH_PORT }}" \
            server-php/ \
            ${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_REMOTE_ROOT }}/api/

      - name: Fix file permissions via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            find ${{ secrets.CPANEL_REMOTE_ROOT }}/api -type d -exec chmod 755 {} \;
            find ${{ secrets.CPANEL_REMOTE_ROOT }}/api -type f -exec chmod 644 {} \;
            echo "✅ Permissions fixed"
            echo "✅ Deploy complete"
