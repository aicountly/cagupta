name: Deploy to cPanel via FTPS (manual)

on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Debug web/package.json (CI)
        run: |
          echo "=== HEAD ==="
          git rev-parse HEAD
          echo "=== web/package.json (first 120 lines) ==="
          nl -ba web/package.json | sed -n '1,120p'
          echo "=== bytes/encoding check ==="
          python3 - <<'PY'
          b=open('web/package.json','rb').read()
          print("len:", len(b))
          print("first20bytes:", b[:20])
          print("contains_null:", b'\x00' in b)
          PY

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Deploy web/dist via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT }}
          protocol: ftps
          local-dir: web/dist/
          server-dir: ${{ secrets.CPANEL_FTP_REMOTE_ROOT }}/
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            !**/.env.example
            **/.htaccess

      - name: Deploy server-php via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT }}
          protocol: ftps
          local-dir: server-php/
          server-dir: ${{ secrets.CPANEL_FTP_REMOTE_ROOT }}/api/
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/Thumbs.db
            **/.env
            **/.env.*
            !**/.env.example
            **/.htaccess
