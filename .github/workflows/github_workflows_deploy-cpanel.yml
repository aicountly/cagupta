name: Deploy to cPanel via SSH (manual)

on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Deploy web/dist to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          source: "web/dist/*"
          target: ${{ secrets.CPANEL_REMOTE_ROOT }}/
          strip_components: 2
          overwrite: true

      - name: Deploy server-php to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          source: "server-php/*"
          target: ${{ secrets.CPANEL_REMOTE_ROOT }}/api/
          strip_components: 1
          overwrite: true

      - name: Fix file permissions via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            find ${{ secrets.CPANEL_REMOTE_ROOT }}/api -type d -exec chmod 755 {} \;
            find ${{ secrets.CPANEL_REMOTE_ROOT }}/api -type f -exec chmod 644 {} \;
            echo "✅ Permissions fixed"
            echo "✅ Deploy complete"
