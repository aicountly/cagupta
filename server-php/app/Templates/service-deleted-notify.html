<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service engagement deleted – CA Rahul Gupta</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .logo-strip { background: #ffffff; padding: 20px 32px; text-align: center; border-bottom: 3px solid #F37920; }
    .logo-strip img { height: 52px; width: auto; display: block; margin: 0 auto; }
    .header { background: #1a3c6e; padding: 24px 32px; }
    .header h1 { color: #ffffff; margin: 0; font-size: 20px; }
    .body { padding: 28px 32px; color: #333333; line-height: 1.6; font-size: 14px; }
    .kv { margin: 12px 0; }
    .k { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .v { font-weight: 600; color: #0f172a; margin-top: 4px; }
    .footer { background: #f4f6f8; padding: 16px 32px; text-align: center; font-size: 12px; color: #888888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-strip">
      <img src="https://carahulgupta.in/cropped_logo.png" alt="CA Rahul Gupta" height="52" style="display:block;margin:0 auto;" />
    </div>
    <div class="header">
      <h1>Service engagement deleted</h1>
    </div>
    <div class="body">
      <p>A service engagement was <strong>permanently deleted</strong> from the portal.</p>
      <div class="kv"><div class="k">Service ID</div><div class="v">{{serviceId}}</div></div>
      <div class="kv"><div class="k">Client</div><div class="v">{{clientName}}</div></div>
      <div class="kv"><div class="k">Service type</div><div class="v">{{serviceType}}</div></div>
      <div class="kv"><div class="k">Deleted by</div><div class="v">{{actorName}} &lt;{{actorEmail}}&gt;</div></div>
      <div class="kv"><div class="k">Time</div><div class="v">{{timestamp}}</div></div>
    </div>
    <div class="footer">
      <p>© CA Rahul Gupta Office Portal</p>
    </div>
  </div>
</body>
</html>
