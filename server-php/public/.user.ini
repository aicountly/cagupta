; PHP per-directory configuration for cPanel / Apache FastCGI or PHP-FPM.
; This file is read by CGI/FastCGI SAPIs; it is NOT used by mod_php.
;
; IMPORTANT — open_basedir:
;   PHP's open_basedir can only be made MORE restrictive at runtime (not less).
;   If cPanel's PHP-FPM pool config already restricts open_basedir to public_html,
;   this value here will be ignored. In that case you must expand open_basedir in:
;     cPanel → MultiPHP INI Editor → (select this domain) → open_basedir
;   Add the following path so PHP can write outside public_html:
;     /home/carahulgupta/:/tmp/:/var/tmp/
;
; The line below is effective when NO server-level open_basedir is set (or when
; the cPanel INI editor writes it into the FPM pool directly).
open_basedir = /home/carahulgupta/:/tmp/:/var/tmp/

; File upload limits — increase if blog cover images are large.
file_uploads        = On
upload_max_filesize = 10M
post_max_size       = 12M
max_input_time      = 60
