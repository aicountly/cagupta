<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CA Office Portal</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; min-height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    #sidebar {
      width: 240px; min-height: 100vh; background: #1a1a2e;
      color: #c9d1e0; display: flex; flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar .logo {
      padding: 24px 20px 16px;
      font-size: 18px; font-weight: 700; color: #fff;
      border-bottom: 1px solid #2e3553; letter-spacing: 0.3px;
    }
    #sidebar .logo span { color: #4f8ef7; }
    nav { flex: 1; padding: 12px 0; }
    .nav-section { padding: 6px 20px 2px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: #5a6585; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer; font-size: 14px;
      border-left: 3px solid transparent; transition: background .15s, border-color .15s;
    }
    .nav-item:hover { background: #22294a; }
    .nav-item.active { background: #1e2d5a; border-left-color: #4f8ef7; color: #fff; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-sub { padding-left: 32px; }
    .nav-sub .nav-item { font-size: 13px; padding: 8px 20px 8px 0; }
    .nav-parent { font-weight: 600; }

    /* ── Main content ─────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    header {
      background: #fff; padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e4e8f0; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    header h1 { font-size: 17px; font-weight: 600; color: #1a1a2e; }
    header .breadcrumb { font-size: 13px; color: #7b8ab5; }

    .content { padding: 28px; overflow-y: auto; flex: 1; }

    /* ── Cards / panels ───────────────────────────────────────── */
    .panel {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .panel-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; background: #eef2ff; color: #4f8ef7;
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn-primary { background: #4f8ef7; color: #fff; }
    .btn-danger  { background: #f75f5f; color: #fff; padding: 5px 10px; font-size: 12px; }
    .btn-sm      { padding: 5px 12px; font-size: 12px; }

    /* ── Table ────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #f5f7fc; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700;
         text-transform: uppercase; letter-spacing: .6px; color: #7b8ab5;
         border-bottom: 2px solid #e4e8f0; }
    td { padding: 12px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    .empty-row td { text-align: center; padding: 40px; color: #a0abc4; font-size: 14px; }

    /* ── Type pills ───────────────────────────────────────────── */
    .type-pill {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: capitalize;
    }
    .type-proprietary { background: #fff3e0; color: #e65100; }
    .type-huf         { background: #e8f5e9; color: #2e7d32; }
    .type-pvt_ltd     { background: #e3f2fd; color: #1565c0; }
    .type-llp         { background: #f3e5f5; color: #6a1b9a; }
    .type-partnership { background: #fce4ec; color: #880e4f; }
    .type-other       { background: #f5f5f5; color: #424242; }
    .type-individual  { background: #e0f7fa; color: #00695c; }

    /* ── Modal ────────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 28px 32px;
      width: 420px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: #1a1a2e; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600;
      color: #7b8ab5; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px; border: 1.5px solid #e4e8f0;
      border-radius: 7px; font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #4f8ef7; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-cancel { background: #f0f2f5; color: #1a1a2e; }
    .error-msg { color: #f75f5f; font-size: 12px; margin-top: 6px; display: none; }

    /* ── Dashboard tiles ──────────────────────────────────────── */
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; margin-bottom: 28px; }
    .tile {
      background: #fff; border-radius: 10px; padding: 20px 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07); cursor: pointer;
      border-left: 4px solid transparent; transition: box-shadow .15s, border-color .15s;
    }
    .tile:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .tile.people  { border-left-color: #4f8ef7; }
    .tile.biz     { border-left-color: #f7a84f; }
    .tile .tile-label { font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: #7b8ab5; margin-bottom: 8px; }
    .tile .tile-count { font-size: 32px; font-weight: 800; color: #1a1a2e; }
    .tile .tile-sub   { font-size: 12px; color: #a0abc4; margin-top: 4px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════════════════════════════ -->
<div id="sidebar">
  <div class="logo">🏢 <span>CA</span> Portal</div>
  <nav>
    <div class="nav-section">Main</div>
    <div class="nav-item" onclick="showView('dashboard')">
      <span class="icon">📊</span> Dashboard
    </div>

    <div class="nav-section" style="margin-top:12px">Clients</div>
    <div class="nav-item nav-parent" onclick="showView('clients')">
      <span class="icon">👥</span> All Clients
    </div>
    <div class="nav-sub">
      <div class="nav-item" id="menu-people" onclick="showView('people')">
        <span class="icon">🧑</span> People
      </div>
      <div class="nav-item" id="menu-businesses" onclick="showView('businesses')">
        <span class="icon">🏢</span> Businesses
      </div>
    </div>
  </nav>
</div>

<!-- ══════════════════════════════════════════════════════════════
     MAIN
════════════════════════════════════════════════════════════════ -->
<div id="main">
  <header>
    <h1 id="page-title">Dashboard</h1>
    <span class="breadcrumb" id="breadcrumb">Home</span>
  </header>

  <div class="content" id="content">
    <!-- views rendered here by JS -->
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     ADD PERSON MODAL
════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-person">
  <div class="modal">
    <h2>Add Person</h2>
    <div class="form-group">
      <label>Full Name *</label>
      <input id="p-name" type="text" placeholder="e.g. Ramesh Kumar" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="p-email" type="email" placeholder="ramesh@example.com" />
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input id="p-phone" type="tel" placeholder="9999999999" />
    </div>
    <div class="form-group">
      <label>PAN</label>
      <input id="p-pan" type="text" placeholder="ABCDE1234F" maxlength="10" />
    </div>
    <div class="error-msg" id="p-error"></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeModal('modal-person')">Cancel</button>
      <button class="btn btn-primary" onclick="submitPerson()">Add Person</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     ADD BUSINESS MODAL
════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-business">
  <div class="modal">
    <h2>Add Business</h2>
    <div class="form-group">
      <label>Business Name *</label>
      <input id="b-name" type="text" placeholder="e.g. Kumar Traders" />
    </div>
    <div class="form-group">
      <label>Business Type *</label>
      <select id="b-type">
        <option value="">— select type —</option>
        <option value="proprietary">Proprietary Firm</option>
        <option value="huf">HUF (Hindu Undivided Family)</option>
        <option value="pvt_ltd">Private Limited Company</option>
        <option value="llp">LLP (Limited Liability Partnership)</option>
        <option value="partnership">Partnership Firm</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>PAN</label>
      <input id="b-pan" type="text" placeholder="AAAAA0000A" maxlength="10" />
    </div>
    <div class="form-group">
      <label>CIN <span style="font-size:10px;color:#a0abc4">(for Pvt Ltd / LLP)</span></label>
      <input id="b-cin" type="text" placeholder="U12345MH2020PTC123456" />
    </div>
    <div class="error-msg" id="b-error"></div>
    <div class="form-actions">
      <button class="btn btn-cancel" onclick="closeModal('modal-business')">Cancel</button>
      <button class="btn btn-primary" onclick="submitBusiness()">Add Business</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Change this to match your backend URL (e.g. https://api.yourdomain.com/api)
const API = window.CA_API_BASE || 'http://localhost:4000/api';

// ── Fallback demo data (shown when the backend API is not reachable) ──────────
const DEMO_PEOPLE = [
  { id: 1, name: 'Ramesh Kumar', email: 'ramesh@example.com', phone: '9876543210', pan: 'ABCDE1234F', type: 'individual' },
  { id: 2, name: 'Sunita Sharma', email: 'sunita@example.com', phone: '9123456789', pan: 'FGHIJ5678K', type: 'individual' },
  { id: 3, name: 'Arjun Mehta', email: 'arjun@example.com', phone: '9988776655', pan: 'LMNOP9012Q', type: 'individual' },
  { id: 4, name: 'Priya Nair', email: 'priya@example.com', phone: '9871234560', pan: 'PQRST3456R', type: 'individual' },
];
const DEMO_BUSINESSES = [
  { id: 1, name: 'Kumar Traders', businessType: 'proprietary', pan: 'KUMTR0001P', cin: '', members: [1] },
  { id: 2, name: 'Sharma HUF', businessType: 'huf', pan: 'SRMHF0002H', cin: '', members: [2] },
  { id: 3, name: 'Acme Solutions Pvt Ltd', businessType: 'pvt_ltd', pan: 'ACMSO0003C', cin: 'U72200MH2020PTC123456', members: [1, 3] },
  { id: 4, name: 'XYZ & Associates LLP', businessType: 'llp', pan: 'XYZAS0004L', cin: 'AAA-1234', members: [2, 3] },
  { id: 5, name: 'Metro Constructions', businessType: 'partnership', pan: 'MTRCO0005P', cin: '', members: [4] },
];

// ── State ─────────────────────────────────────────────────────────────────────
let currentView = 'dashboard';

// ── Navigation ─────────────────────────────────────────────────────────────────
function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

  const titles = {
    dashboard  : 'Dashboard',
    clients    : 'All Clients',
    people     : 'People',
    businesses : 'Businesses',
  };
  const breadcrumbs = {
    dashboard  : 'Home',
    clients    : 'Clients',
    people     : 'Clients › People',
    businesses : 'Clients › Businesses',
  };

  document.getElementById('page-title').textContent = titles[view] || view;
  document.getElementById('breadcrumb').textContent  = breadcrumbs[view] || view;

  if (view === 'people')     document.getElementById('menu-people').classList.add('active');
  if (view === 'businesses') document.getElementById('menu-businesses').classList.add('active');

  const content = document.getElementById('content');

  if (view === 'dashboard')  { renderDashboard(content); return; }
  if (view === 'people')     { renderPeople(content);    return; }
  if (view === 'businesses') { renderBusinesses(content); return; }
  if (view === 'clients') {
    content.innerHTML = `
      <div class="tiles">
        <div class="tile people" onclick="showView('people')">
          <div class="tile-label">👤 People</div>
          <div class="tile-sub">Individual clients</div>
        </div>
        <div class="tile biz" onclick="showView('businesses')">
          <div class="tile-label">🏢 Businesses</div>
          <div class="tile-sub">Firms &amp; companies</div>
        </div>
      </div>`;
  }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function renderDashboard(container) {
  container.innerHTML = '<p style="color:#a0abc4;padding:20px">Loading…</p>';
  const [pd, bd] = await Promise.all([
    fetch(`${API}/clients/people`).then(r => r.json()).catch(() => ({ people: DEMO_PEOPLE })),
    fetch(`${API}/clients/businesses`).then(r => r.json()).catch(() => ({ businesses: DEMO_BUSINESSES })),
  ]);
  const pc = pd.people.length;
  const bc = bd.businesses.length;
  container.innerHTML = `
    <div class="tiles">
      <div class="tile people" onclick="showView('people')">
        <div class="tile-label">👤 People</div>
        <div class="tile-count">${pc}</div>
        <div class="tile-sub">Individual clients</div>
      </div>
      <div class="tile biz" onclick="showView('businesses')">
        <div class="tile-label">🏢 Businesses</div>
        <div class="tile-count">${bc}</div>
        <div class="tile-sub">Firms &amp; companies</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Quick Links</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="showView('people')">View People List</button>
        <button class="btn btn-primary" style="background:#f7a84f" onclick="showView('businesses')">View Businesses List</button>
      </div>
    </div>`;
}

// ── People ─────────────────────────────────────────────────────────────────────
async function renderPeople(container) {
  container.innerHTML = '<p style="color:#a0abc4;padding:20px">Loading…</p>';
  const data = await fetch(`${API}/clients/people`).then(r => r.json()).catch(() => ({ people: DEMO_PEOPLE }));
  const rows = data.people.length
    ? data.people.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><strong>${esc(p.name)}</strong></td>
          <td>${esc(p.email) || '—'}</td>
          <td>${esc(p.phone) || '—'}</td>
          <td>${esc(p.pan) || '—'}</td>
          <td><span class="type-pill type-individual">Individual</span></td>
        </tr>`).join('')
    : '<tr class="empty-row"><td colspan="6">No people found. Add your first client above.</td></tr>';

  container.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">People <span class="badge">${data.people.length}</span></span>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-person')">+ Add Person</button>
      </div>
      <div class="table-wrap">
        <table id="people-table">
          <thead><tr>
            <th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>PAN</th><th>Type</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── Businesses ─────────────────────────────────────────────────────────────────
async function renderBusinesses(container) {
  container.innerHTML = '<p style="color:#a0abc4;padding:20px">Loading…</p>';
  const data = await fetch(`${API}/clients/businesses`).then(r => r.json()).catch(() => ({ businesses: DEMO_BUSINESSES }));

  const typeLabels = {
    proprietary : 'Proprietary Firm',
    huf         : 'HUF',
    pvt_ltd     : 'Pvt Ltd',
    llp         : 'LLP',
    partnership : 'Partnership',
    other       : 'Other',
  };

  const rows = data.businesses.length
    ? data.businesses.map(b => `
        <tr>
          <td>${b.id}</td>
          <td><strong>${esc(b.name)}</strong></td>
          <td><span class="type-pill type-${esc(b.businessType)}">${esc(typeLabels[b.businessType] || b.businessType)}</span></td>
          <td>${esc(b.pan) || '—'}</td>
          <td>${esc(b.cin) || '—'}</td>
          <td>${b.members.length}</td>
        </tr>`).join('')
    : '<tr class="empty-row"><td colspan="6">No businesses found. Add your first firm above.</td></tr>';

  container.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Businesses <span class="badge">${data.businesses.length}</span></span>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-business')">+ Add Business</button>
      </div>
      <div class="table-wrap">
        <table id="biz-table">
          <thead><tr>
            <th>#</th><th>Name</th><th>Type</th><th>PAN</th><th>CIN</th><th>Members</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── Modal helpers ──────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.getElementById(id).querySelectorAll('input,select').forEach(el => el.value = '');
  const err = document.getElementById(id.replace('modal-', '') === 'person' ? 'p-error' : 'b-error');
  if (err) { err.style.display = 'none'; err.textContent = ''; }
}

// ── Submit person ──────────────────────────────────────────────────────────────
async function submitPerson() {
  const name  = document.getElementById('p-name').value.trim();
  const email = document.getElementById('p-email').value.trim();
  const phone = document.getElementById('p-phone').value.trim();
  const pan   = document.getElementById('p-pan').value.trim();
  const errEl = document.getElementById('p-error');

  if (!name) { showErr(errEl, 'Name is required.'); return; }

  try {
    const res = await fetch(`${API}/clients/people`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, pan }),
    });
    const json = await res.json();
    if (!res.ok) { showErr(errEl, json.error || 'Error adding person.'); return; }
  } catch (_) {
    showErr(errEl, 'Could not reach the server. Please try again.');
    return;
  }
  closeModal('modal-person');
  renderPeople(document.getElementById('content'));
}

// ── Submit business ────────────────────────────────────────────────────────────
async function submitBusiness() {
  const name         = document.getElementById('b-name').value.trim();
  const businessType = document.getElementById('b-type').value;
  const pan          = document.getElementById('b-pan').value.trim();
  const cin          = document.getElementById('b-cin').value.trim();
  const errEl        = document.getElementById('b-error');

  if (!name)         { showErr(errEl, 'Business name is required.'); return; }
  if (!businessType) { showErr(errEl, 'Please select a business type.'); return; }

  try {
    const res = await fetch(`${API}/clients/businesses`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, businessType, pan, cin }),
    });
    const json = await res.json();
    if (!res.ok) { showErr(errEl, json.error || 'Error adding business.'); return; }
  } catch (_) {
    showErr(errEl, 'Could not reach the server. Please try again.');
    return;
  }
  closeModal('modal-business');
  renderBusinesses(document.getElementById('content'));
}

// ── Utilities ──────────────────────────────────────────────────────────────────
function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── Boot ───────────────────────────────────────────────────────────────────────
showView('dashboard');
</script>
</body>
</html>
